name: Midnight Budget Reset

on:
  schedule:
    # JST 00:00 = UTC 15:00
    - cron: '0 15 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'ドライラン（実際の予算変更なし）'
        required: false
        type: boolean
        default: false

env:
  API_BASE_URL: https://tik-tok-ads-automation-backend.vercel.app

jobs:
  reset-budgets:
    runs-on: ubuntu-latest
    steps:
      - name: Reset daily budgets per advertiser
        id: reset
        run: |
          jst_time=$(TZ='Asia/Tokyo' date '+%Y-%m-%d %H:%M JST')
          echo "Execution time: $jst_time"

          dry_run_param="false"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            dry_run_param="true"
            echo "🧪 DRY RUN MODE"
          fi

          # アカウントごとに個別にリセット（タイムアウト防止）
          ADVERTISER_IDS=(
            "7468288053866561553"   # AI_1
            "7523128243466551303"   # AI_2
            "7543540647266074641"   # AI_3
            "7580666710525493255"   # AI_4
            "7474920444831875080"   # SP1
            "7592868952431362066"   # SP2
            "7616545514662051858"   # SP3
            "7247073333517238273"   # SNS1
            "7543540100849156112"   # SNS2
            "7543540381615800337"   # SNS3
          )

          all_success=true
          total_reset=0
          total_skip=0
          total_error=0

          for adv_id in "${ADVERTISER_IDS[@]}"; do
            echo ""
            echo "━━━ Resetting $adv_id ━━━"

            set +e
            response=$(curl -s -w "\n%{http_code}" \
              --max-time 30 \
              --connect-timeout 10 \
              --retry 2 \
              --retry-delay 5 \
              --retry-all-errors \
              -X POST \
              "${{ env.API_BASE_URL }}/api/budget-optimization-v2/reset-budget/$adv_id" \
              -H "Content-Type: application/json" \
              -d "{\"dryRun\": $dry_run_param}")
            curl_exit_code=$?
            set -e

            if [ $curl_exit_code -ne 0 ]; then
              echo "  ⚠️ curl failed for $adv_id (exit code $curl_exit_code)"
              all_success=false
              total_error=$((total_error + 1))
              continue
            fi

            http_code=$(echo "$response" | tail -n1)
            body=$(echo "$response" | sed '$d')

            if [ "$http_code" -eq 200 ] || [ "$http_code" -eq 201 ]; then
              api_success=$(echo "$body" | jq -r '.success // false')
              if [ "$api_success" = "true" ]; then
                reset_count=$(echo "$body" | jq -r '.data.summary.reset // 0')
                skip_count=$(echo "$body" | jq -r '.data.summary.skippedAlreadyDefault // 0')
                error_count=$(echo "$body" | jq -r '.data.summary.errors // 0')
                total_reset=$((total_reset + reset_count))
                total_skip=$((total_skip + skip_count))
                total_error=$((total_error + error_count))
                echo "  ✅ reset=$reset_count skip=$skip_count errors=$error_count"

                # 個別結果
                echo "$body" | jq -r '.data.adResults[]? |
                  "  [\(.action)] \(.adName): ¥\(.oldBudget) → ¥\(.newBudget)" +
                  (if .error then " (ERROR: \(.error))" else "" end)' 2>/dev/null || true
              else
                api_error=$(echo "$body" | jq -r '.error // "Unknown"')
                echo "  ❌ API error: $api_error"
                all_success=false
                total_error=$((total_error + 1))
              fi
            else
              echo "  ❌ HTTP $http_code"
              all_success=false
              total_error=$((total_error + 1))
            fi

            # アカウント間に1秒待機（API負荷軽減）
            sleep 1
          done

          echo ""
          echo "=== 📊 全体結果 ==="
          echo "  リセット: $total_reset | スキップ: $total_skip | エラー: $total_error"

          if [ "$all_success" = true ]; then
            echo "result=success" >> $GITHUB_OUTPUT
          else
            echo "result=partial_failure" >> $GITHUB_OUTPUT
            # 一部失敗でもjobは成功扱い（全滅でなければ）
            if [ $total_reset -gt 0 ] || [ $total_skip -gt 0 ]; then
              echo "⚠️ Some advertisers failed but others succeeded"
            else
              echo "❌ All advertisers failed"
              exit 1
            fi
          fi

      - name: Notify LINE on failure
        if: failure()
        run: |
          if [ -z "${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}" ] || [ -z "${{ secrets.LINE_USER_ID }}" ]; then
            echo "LINE Secrets未設定 → 通知スキップ"
            exit 0
          fi
          jst_time=$(TZ='Asia/Tokyo' date '+%Y-%m-%d %H:%M JST')
          text=$(printf '🚨 Budget Reset Midnight 失敗\n時刻: %s\n予算リセットが全滅または部分失敗しています。手動で即対応してください。\n\nGitHub Actions:\nhttps://github.com/%s/actions/runs/%s' "$jst_time" "${{ github.repository }}" "${{ github.run_id }}")
          curl -s -X POST https://api.line.me/v2/bot/message/push \
            -H "Authorization: Bearer ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"to\":\"${{ secrets.LINE_USER_ID }}\",\"messages\":[{\"type\":\"text\",\"text\":$(echo "$text" | jq -Rs .)}]}"

      - name: Generate Summary
        if: always()
        run: |
          jst_time=$(TZ='Asia/Tokyo' date '+%Y-%m-%d %H:%M JST')
          echo "## Midnight Budget Reset Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Execution Time**: $jst_time" >> $GITHUB_STEP_SUMMARY
          echo "- **Result**: ${{ steps.reset.outputs.result || 'unknown' }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "- **Mode**: 🧪 Dry Run" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See job logs for detailed results." >> $GITHUB_STEP_SUMMARY
