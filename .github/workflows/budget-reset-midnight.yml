name: Midnight Budget Reset

on:
  schedule:
    # JST 00:00 = UTC 15:00
    - cron: '0 15 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'ドライラン（実際の予算変更なし）'
        required: false
        type: boolean
        default: false

env:
  API_BASE_URL: https://tik-tok-ads-automation-backend.vercel.app

jobs:
  reset-budgets:
    runs-on: ubuntu-latest
    steps:
      - name: Reset all daily budgets
        id: reset
        run: |
          jst_time=$(TZ='Asia/Tokyo' date '+%Y-%m-%d %H:%M JST')
          echo "Execution time: $jst_time"

          dry_run_param="false"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            dry_run_param="true"
            echo "🧪 DRY RUN MODE"
          fi

          max_retries=3
          retry_count=0
          success=false

          while [ $retry_count -lt $max_retries ]; do
            set +e
            response=$(curl -s -w "\n%{http_code}" \
              --max-time 300 \
              --connect-timeout 30 \
              --retry 3 \
              --retry-delay 15 \
              --retry-max-time 180 \
              --retry-all-errors \
              -X POST \
              "${{ env.API_BASE_URL }}/api/budget-optimization-v2/reset-budget-all" \
              -H "Content-Type: application/json" \
              -d "{\"dryRun\": $dry_run_param}")
            curl_exit_code=$?
            set -e

            if [ $curl_exit_code -ne 0 ]; then
              retry_count=$((retry_count + 1))
              echo "⚠️ curl failed (exit code $curl_exit_code). Retry $retry_count/$max_retries..."
              if [ $retry_count -lt $max_retries ]; then
                sleep $((30 * retry_count))
                continue
              else
                echo "❌ Failed after $max_retries retries"
                break
              fi
            fi

            http_code=$(echo "$response" | tail -n1)
            body=$(echo "$response" | sed '$d')

            echo "HTTP Status: $http_code"

            if [ "$http_code" -eq 200 ] || [ "$http_code" -eq 201 ]; then
              api_success=$(echo "$body" | jq -r '.success // false')
              if [ "$api_success" != "true" ]; then
                api_error=$(echo "$body" | jq -r '.error // "Unknown error"')
                echo "❌ API returned error: $api_error"
                break
              fi

              echo "✅ Budget reset completed successfully"
              echo ""

              # 結果サマリー
              echo "=== 🔄 予算リセット結果 ==="
              echo "$body" | jq -r '.data.results[]? |
                "────────────────────────────────────────\n" +
                "📋 Advertiser: \(.advertiserId)\n" +
                "  導線: \(.channelType) | デフォルト予算: ¥\(.defaultBudget)\n" +
                "  リセット: \(.summary.reset) | スキップ: \(.summary.skippedAlreadyDefault) | エラー: \(.summary.errors)\n" +
                (.adResults[]? |
                  "  [\(.action)] \(.adName): ¥\(.oldBudget) → ¥\(.newBudget)" +
                  (if .error then " (ERROR: \(.error))" else "" end)
                )'
              echo "────────────────────────────────────────"

              success=true
              break
            elif [ "$http_code" -eq 429 ]; then
              retry_count=$((retry_count + 1))
              wait_time=$((60 * retry_count))
              echo "⚠️ Rate limited. Waiting ${wait_time}s (retry $retry_count/$max_retries)"
              sleep $wait_time
            else
              echo "❌ Error: $http_code"
              echo "$body"
              break
            fi
          done

          if [ "$success" = true ]; then
            echo "result=success" >> $GITHUB_OUTPUT
          else
            echo "result=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Generate Summary
        if: always()
        run: |
          jst_time=$(TZ='Asia/Tokyo' date '+%Y-%m-%d %H:%M JST')
          echo "## Midnight Budget Reset Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Execution Time**: $jst_time" >> $GITHUB_STEP_SUMMARY
          echo "- **Result**: ${{ steps.reset.outputs.result || 'unknown' }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "- **Mode**: 🧪 Dry Run" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See job logs for detailed results." >> $GITHUB_STEP_SUMMARY
