name: Hourly Budget Optimization V2 - Group A (AI)

on:
  schedule:
    # V1日次判定方式: 1日1回 JST 03:00 (UTC 18:00)
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'ドライラン'
        required: false
        type: boolean
        default: false

concurrency:
  group: budget-v2-group-a
  cancel-in-progress: false

env:
  API_BASE_URL: https://tik-tok-ads-automation-backend.vercel.app
  WAIT_BETWEEN_ACCOUNTS_SEC: 15
  GROUP_ADVERTISER_IDS: '["7468288053866561553","7523128243466551303","7543540647266074641","7580666710525493255"]'

jobs:
  optimize-budgets:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        advertiser_id: ["7468288053866561553","7523128243466551303","7543540647266074641","7580666710525493255"]
    steps:
      - name: Wait before processing
        run: sleep ${{ env.WAIT_BETWEEN_ACCOUNTS_SEC }}

      - name: V2 Budget Optimization for ${{ matrix.advertiser_id }}
        id: optimize
        run: |
          echo "Starting V2 budget optimization for: ${{ matrix.advertiser_id }}"

          dry_run_param="false"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            dry_run_param="true"
          fi

          max_retries=3
          retry_count=0
          success=false

          while [ $retry_count -lt $max_retries ]; do
            set +e
            response=$(curl -s -w "\n%{http_code}" \
              --max-time 600 --connect-timeout 30 \
              --retry 3 --retry-delay 15 --retry-max-time 180 --retry-all-errors \
              -X POST \
              "${{ env.API_BASE_URL }}/api/budget-optimization-v2/execute/${{ matrix.advertiser_id }}" \
              -H "Content-Type: application/json" \
              -d "{\"dryRun\": $dry_run_param}")
            curl_exit_code=$?
            set -e

            if [ $curl_exit_code -ne 0 ]; then
              retry_count=$((retry_count + 1))
              echo "⚠️ curl failed (exit $curl_exit_code). Retry $retry_count/$max_retries..."
              [ $retry_count -lt $max_retries ] && sleep $((30 * retry_count)) && continue || break
            fi

            http_code=$(echo "$response" | tail -n1)
            body=$(echo "$response" | sed '$d')
            echo "HTTP Status: $http_code"

            if [ "$http_code" -eq 200 ] || [ "$http_code" -eq 201 ]; then
              api_success=$(echo "$body" | jq -r '.success // false')
              if [ "$api_success" != "true" ]; then
                echo "❌ API error: $(echo "$body" | jq -r '.error // "Unknown"')"
                break
              fi
              echo "✅ Success for ${{ matrix.advertiser_id }}"
              is_first=$(echo "$body" | jq -r '.data.isFirstRound // false')
              echo "$body" | jq -r '.data.summary | "総広告数: \(.totalAds) | 増額: \(.increased) | 継続: \(.continued) | 停止: \(.paused) | スキップ: \(.skipped)"'

              stage1_count=$(echo "$body" | jq -r '.data.stage1Results | length')
              if [ "$stage1_count" -gt 0 ]; then
                echo "=== 💰 Stage1 ==="
                echo "$body" | jq -r '.data.stage1Results[] | "[\(.action)] \(.adName) | 予算¥\(.currentBudget // 0)" + (if .newBudget then "→¥\(.newBudget)" else "" end) + " | \(.reason)"'
              fi
              stage2_count=$(echo "$body" | jq -r '.data.stage2Results | length')
              if [ "$stage2_count" -gt 0 ]; then
                echo "=== 🛑 Stage2 ==="
                echo "$body" | jq -r '.data.stage2Results[] | "[\(.action)] \(.adName) | \(.reason)"'
              fi

              success=true
              break
            elif [ "$http_code" -eq 429 ]; then
              retry_count=$((retry_count + 1))
              sleep $((60 * retry_count))
            else
              echo "❌ Error: $http_code"
              echo "$body"
              break
            fi
          done

          if [ "$success" = true ]; then
            echo "result=success" >> $GITHUB_OUTPUT
            echo "is_first_round=$is_first" >> $GITHUB_OUTPUT
            echo "$body" > /tmp/optimize_response_${{ matrix.advertiser_id }}.json
          else
            echo "result=failed" >> $GITHUB_OUTPUT
          fi

      - name: Write daily report to Google Sheets
        if: steps.optimize.outputs.result == 'success' && steps.optimize.outputs.is_first_round == 'true'
        run: |
          result_data=$(jq -c '.data' /tmp/optimize_response_${{ matrix.advertiser_id }}.json)
          max_retries=3
          retry_count=0
          while [ $retry_count -lt $max_retries ]; do
            set +e
            response=$(curl -s -w "\n%{http_code}" --max-time 300 --connect-timeout 30 \
              -X POST "${{ env.API_BASE_URL }}/api/budget-optimization-v2/write-daily-report" \
              -H "Content-Type: application/json" \
              -d "{\"results\": [$result_data]}")
            curl_exit_code=$?
            set -e
            if [ $curl_exit_code -ne 0 ]; then
              retry_count=$((retry_count + 1))
              [ $retry_count -lt $max_retries ] && sleep $((15 * retry_count)) && continue || break
            fi
            http_code=$(echo "$response" | tail -n1)
            if [ "$http_code" -eq 200 ] || [ "$http_code" -eq 201 ]; then
              echo "✅ Sheet written"
              break
            else
              retry_count=$((retry_count + 1))
              [ $retry_count -lt $max_retries ] && sleep $((15 * retry_count)) || echo "❌ failed"
            fi
          done
