name: Seminar Attendance CPO Alert

on:
  schedule:
    # 毎日11:00 JST = 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'dry-run で通知・履歴保存をスキップ'
        required: false
        default: 'false'

env:
  API_BASE_URL: https://tik-tok-ads-automation-backend.vercel.app

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - name: Run alert via Vercel
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          echo "POST /jobs/seminar-attendance-alert?dryRun=$DRY_RUN"
          response=$(curl -s -w "\n%{http_code}" --max-time 300 \
            -X POST "${{ env.API_BASE_URL }}/jobs/seminar-attendance-alert?dryRun=$DRY_RUN" \
            -H "Content-Type: application/json" \
            -d '{}')
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          echo "HTTP Status: $http_code"
          echo "$body" | jq . || echo "$body"
          [ "$http_code" -eq 200 ] || [ "$http_code" -eq 201 ]
        timeout-minutes: 10
