name: Daily Budget Optimization

on:
  schedule:
    # 毎日3時（日本時間）= 18時（UTC前日）
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      advertiser_ids:
        description: '特定のAdvertiser IDsをカンマ区切りで指定（空欄で全アカウント）'
        required: false
        type: string

env:
  API_BASE_URL: https://tik-tok-ads-automation-backend.vercel.app
  WAIT_BETWEEN_ACCOUNTS_SEC: 60
  # スケジュール実行時の対象アカウント（カンマ区切り）
  # NOTE: SS1 (7247073333517238273) は一時的に除外中
  # NOTE: AI_1 (7468288053866561553) は一時的に除外中
  # NOTE: AI_2 (7523128243466551303) は一時的に除外中
  # NOTE: AI_3 (7543540647266074641) は一時的に除外中
  # NOTE: SNS3 (7543540381615800337) は予算調整V2に移行済み
  SCHEDULED_ADVERTISER_IDS: '[]'

jobs:
  # Step 1: アクティブなAdvertiser IDを取得
  get-advertisers:
    runs-on: ubuntu-latest
    outputs:
      advertiser_ids: ${{ steps.get_ids.outputs.ids }}
    steps:
      - name: Get Active Advertiser IDs
        id: get_ids
        run: |
          if [ -n "${{ github.event.inputs.advertiser_ids }}" ]; then
            # 手動実行時は指定されたIDを使用
            ids=$(echo "${{ github.event.inputs.advertiser_ids }}" | jq -R -c 'split(",")')
            echo "Using manually specified advertiser IDs: $ids"
          else
            # スケジュール実行時は固定のアカウントリストを使用
            ids='${{ env.SCHEDULED_ADVERTISER_IDS }}'
            echo "Using scheduled advertiser IDs: $ids"
          fi

          echo "ids=$ids" >> $GITHUB_OUTPUT

  # Step 2: 各アカウントの予算最適化を順次実行
  optimize-budgets:
    runs-on: ubuntu-latest
    needs: get-advertisers
    strategy:
      fail-fast: false
      max-parallel: 1  # 重要: 順次実行でレート制限を回避
      matrix:
        advertiser_id: ${{ fromJson(needs.get-advertisers.outputs.advertiser_ids) }}
    steps:
      - name: Wait before processing
        run: |
          echo "Waiting ${{ env.WAIT_BETWEEN_ACCOUNTS_SEC }} seconds before processing..."
          sleep ${{ env.WAIT_BETWEEN_ACCOUNTS_SEC }}

      - name: Optimize Budget for ${{ matrix.advertiser_id }}
        id: optimize
        run: |
          echo "Starting budget optimization for: ${{ matrix.advertiser_id }}"

          # 最大3回リトライ
          max_retries=3
          retry_count=0
          success=false

          while [ $retry_count -lt $max_retries ]; do
            # curlを実行し、終了コードをキャプチャ
            # mode: ROAS_MAXIMIZE（ROAS最大化モード）を使用
            # --retry-all-errors: SSL接続エラー(exit code 35)を含む全エラーでリトライ
            # --connect-timeout 30: 接続タイムアウトを30秒に設定
            set +e  # エラーでスクリプトを終了しない
            response=$(curl -s -w "\n%{http_code}" \
              --max-time 600 \
              --connect-timeout 30 \
              --retry 5 \
              --retry-delay 15 \
              --retry-max-time 300 \
              --retry-all-errors \
              -X POST \
              "${{ env.API_BASE_URL }}/api/optimization/execute/${{ matrix.advertiser_id }}" \
              -H "Content-Type: application/json" \
              -d '{"mode": "ROAS_MAXIMIZE"}')
            curl_exit_code=$?
            set -e

            # curlが失敗した場合（SSL/接続エラーなど）
            if [ $curl_exit_code -ne 0 ]; then
              retry_count=$((retry_count + 1))
              echo "⚠️ curl failed with exit code $curl_exit_code. Retry $retry_count/$max_retries..."
              if [ $retry_count -lt $max_retries ]; then
                sleep $((30 * retry_count))
                continue
              else
                echo "❌ curl failed after $max_retries retries (exit code: $curl_exit_code)"
                break
              fi
            fi

            http_code=$(echo "$response" | tail -n1)
            body=$(echo "$response" | sed '$d')

            echo "HTTP Status: $http_code"

            if [ "$http_code" -eq 200 ] || [ "$http_code" -eq 201 ]; then
              echo "✅ Success for ${{ matrix.advertiser_id }}"
              echo ""

              # サマリー情報を出力
              echo "=== 📊 実行サマリー ==="
              echo "$body" | jq -r '.data | "総広告数: \(.totalAds // 0) | 評価済み: \(.evaluated // 0) | 判定数: \(.decisions // 0) | 実行数: \(.executed // 0)"'
              echo ""

              # 目標値を出力
              echo "=== 🎯 目標値 ==="
              echo "$body" | jq -r '.data.detailedLogs[0]?.targets | "目標CPA: \(.targetCPA // "未設定")円 | 許容CPA: \(.allowableCPA // "未設定")円 | 目標フロントCPO: \(.targetFrontCPO // "未設定")円 | 許容フロントCPO: \(.allowableFrontCPO // "未設定")円"'
              echo ""

              # 各広告の詳細判定結果を出力
              echo "=== 📋 広告別判定結果（詳細） ==="
              echo "────────────────────────────────────────────────────────────────"
              echo "$body" | jq -r '.data.detailedLogs[]? |
                "広告名: \(.adName // .adId)\n" +
                "  📈 指標: 広告費=\(.metrics.spend // 0)円 | CV数=\(.metrics.cvCount // 0) | フロント販売=\(.metrics.frontSalesCount // 0)本\n" +
                "  💰 実績: CPA=\(.metrics.cpa // "N/A")円 | フロントCPO=\(.metrics.frontCpo // "N/A")円\n" +
                "  🎬 判定: [\(.action // "N/A")] \(.reason // "理由なし")\n" +
                "────────────────────────────────────────────────────────────────"'
              echo ""

              # Smart+キャンペーンの結果
              smart_plus_count=$(echo "$body" | jq -r '.data.smartPlusCampaigns.total // 0')
              if [ "$smart_plus_count" -gt 0 ]; then
                echo "=== 🚀 Smart+キャンペーン結果 ==="
                echo "$body" | jq -r '.data.smartPlusCampaigns.results[]? | "[\(.action // "N/A")] Campaign: \(.campaignId // .adgroupId) - 予算: \(.oldBudget // "?") → \(.newBudget // "?")"'
                echo ""
              fi

              # クールダウンでスキップされた広告セットを表示
              cooldown_count=$(echo "$body" | jq -r '[.data.results[]? | select(.action == "SKIPPED_DUE_TO_COOLDOWN")] | length')
              if [ "$cooldown_count" -gt 0 ]; then
                echo "=== ⏸️ クールダウンでスキップ（3日以内に増額済み） ==="
                echo "$body" | jq -r '.data.results[]? | select(.action == "SKIPPED_DUE_TO_COOLDOWN") | "AdGroup: \(.adgroupId) - \(.reason // "クールダウン期間中")"'
                echo ""
              fi

              # 上限日予算でスキップされた広告セットを表示
              cap_count=$(echo "$body" | jq -r '[.data.results[]? | select(.action == "SKIPPED_DUE_TO_CAP")] | length')
              if [ "$cap_count" -gt 0 ]; then
                echo "=== 🔒 上限日予算でスキップ ==="
                echo "$body" | jq -r '.data.results[]? | select(.action == "SKIPPED_DUE_TO_CAP") | "AdGroup: \(.adgroupId) - \(.reason // "上限日予算に到達")"'
                echo ""
              fi

              # エラーがあれば出力
              has_errors=$(echo "$body" | jq -r '.data.results[]? | select(.success == false) | .adgroupId' | head -1)
              if [ -n "$has_errors" ]; then
                echo "=== ⚠️ エラー詳細 ==="
                echo "$body" | jq -r '.data.results[]? | select(.success == false) | "AdGroup: \(.adgroupId) - \(.error // "不明なエラー")"'
                echo ""
              fi

              success=true
              break
            elif [ "$http_code" -eq 429 ]; then
              # レート制限: 指数バックオフでリトライ
              retry_count=$((retry_count + 1))
              wait_time=$((60 * retry_count))
              echo "⚠️ Rate limited. Waiting ${wait_time}s before retry $retry_count/$max_retries..."
              sleep $wait_time
            else
              echo "❌ Error for ${{ matrix.advertiser_id }}: $http_code"
              echo "$body"
              break
            fi
          done

          if [ "$success" = true ]; then
            echo "result=success" >> $GITHUB_OUTPUT
          else
            echo "result=failed" >> $GITHUB_OUTPUT
          fi

  # Step 3: 結果サマリー
  summary:
    runs-on: ubuntu-latest
    needs: [get-advertisers, optimize-budgets]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "## Budget Optimization Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Execution Time**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Accounts Processed**: ${{ needs.get-advertisers.outputs.advertiser_ids }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See job logs for detailed results." >> $GITHUB_STEP_SUMMARY
